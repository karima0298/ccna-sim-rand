<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCNA Simulator - Start</title>
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        /* カード内のボタン用スタイル */
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .mode-btn {
            flex: 1;
            text-align: center;
            padding: 10px 5px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .btn-normal {
            background-color: #0066cc;
            color: white;
            border: 1px solid #0055aa;
        }
        .btn-normal:hover {
            background-color: #0055aa;
        }
        .btn-practice {
            background-color: #4CAF50;
            color: white;
            border: 1px solid #45a049;
        }
        .btn-practice:hover {
            background-color: #45a049;
        }
        .btn-exam {
            background-color: #f44336;
            color: white;
            border: 1px solid #d32f2f;
        }
        .btn-exam:hover {
            background-color: #d32f2f;
        }
        /* カード自体がリンクだった場合の名残を消すための調整 */
        .scenario-card {
            display: flex;
            flex-direction: column;
            cursor: default;
        }
    </style>

    <script>
        const SECRET_KEY = "actias22"; 
        const RETURN_URL = "https://script.google.com/macros/s/AKfycbwuT4rJ6aV2Gi-cOVayvDuvMSuu69w35fb6u7XfXsVJ/dev"; 
        
        const currentUrlParams = new URLSearchParams(window.location.search);
        const providedKey = currentUrlParams.get('key');

        /* ▼ 動作検証のため一時的にコメントアウト (JavaScriptの正しいコメント記述) ▼
        if (providedKey === SECRET_KEY) {
            sessionStorage.setItem('isSimulatorAuth', 'true');
            currentUrlParams.delete('key');
            const newUrl = window.location.pathname + (currentUrlParams.toString() ? '?' + currentUrlParams.toString() : '');
            window.history.replaceState(null, null, newUrl);
            
        } else if (sessionStorage.getItem('isSimulatorAuth') !== 'true') {
            window.top.location.href = RETURN_URL;
        }
        ▲ ここまで ▲ */
    </script>
    <script src="js/scenario_data.js"></script>
</head>

<body>
    <div class="start-container">
        <div class="title-group">
            <h1 class="main-title">CCNA Simulator</h1>
            <p class="subtitle">powered by Actias</p>
        </div>

        <div class="scenario-grid" id="scenario-list">
            </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const listEl = document.getElementById('scenario-list');

            if (typeof scenarios !== 'undefined') {
                scenarios.filter(scene => scene.id !== 'free').forEach(scene => {
                    const card = document.createElement('div');
                    card.className = 'scenario-card';

                    if (scene.image) {
                        const img = document.createElement('img');
                        img.src = scene.image;
                        img.alt = scene.title;
                        img.className = 'scenario-thumbnail';
                        card.appendChild(img);
                    }

                    const title = document.createElement('h3');
                    title.textContent = scene.title;
                    card.appendChild(title);

                    const btnGroup = document.createElement('div');
                    btnGroup.className = 'button-group';

                    // 試験モード用問題（generateVarsが存在する）かどうかの判定
                    if (scene.generateVars && typeof scene.generateVars === 'function') {
                        const examTag = document.createElement('p');
                        examTag.style = 'color: red; font-weight: bold; font-size: 12px; margin: 5px 0 0 0; text-align: center;';
                        examTag.textContent = '※アドレス/サブネットが毎回変動';
                        card.appendChild(examTag);

                        const btnExam = document.createElement('a');
                        btnExam.className = 'mode-btn btn-exam';
                        btnExam.href = `simulator.html?scenario=${scene.id}&mode=exam`;
                        btnExam.textContent = '試験モード';

                        const btnPractice = document.createElement('a');
                        btnPractice.className = 'mode-btn btn-practice';
                        btnPractice.href = `simulator.html?scenario=${scene.id}&mode=practice`;
                        btnPractice.textContent = '練習モード';

                        btnGroup.appendChild(btnExam);
                        btnGroup.appendChild(btnPractice);
                    } else {
                        const btnNormal = document.createElement('a');
                        btnNormal.className = 'mode-btn btn-normal';
                        btnNormal.href = `simulator.html?scenario=${scene.id}`;
                        btnNormal.textContent = '本番モード';

                        const btnPractice = document.createElement('a');
                        btnPractice.className = 'mode-btn btn-practice';
                        btnPractice.href = `simulator.html?scenario=${scene.id}&mode=practice`;
                        btnPractice.textContent = '練習モード';

                        btnGroup.appendChild(btnNormal);
                        btnGroup.appendChild(btnPractice);
                    }
                    
                    card.appendChild(btnGroup);
                    listEl.appendChild(card);
                });
            }
        });
    </script>
</body>
</html>
