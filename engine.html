<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cisco CCNA コマンドシミュレーター</title>
    <style>
        body { font-family: 'Courier New', monospace; background-color: #1a1a1a; color: #f0f0f0; margin: 0; padding: 20px; display: flex; flex-direction: column; height: auto; min-height: 100vh; overflow-y: auto; }
        h1 { color: #0066cc; margin-bottom: 20px; }
        .mode-selector { display: none; margin-bottom: 15px; }
        .powered-by { color: white; margin-top: -15px; margin-bottom: 15px; font-size: 14px; font-family: 'Courier New', monospace; }
        button { background-color: #0066cc; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; min-width: 120px; }
        button:hover { background-color: #0055aa; }
        button.active { background-color: #004488; font-weight: bold; }
        .terminal-container { flex: 1; display: flex; flex-direction: column; border: 1px solid #333; border-radius: 5px; overflow: hidden; min-height: 400px; }
        #terminal { flex: 1; background-color: #000; color: #33ff33; padding: 10px; overflow-y: auto; font-size: 14px; white-space: pre-wrap; }
        .input-area { display: flex; background-color: #000; border-top: 1px solid #333; padding: 5px; visibility: hidden; }
        #prompt { color: #33ff33; padding: 5px; font-family: 'Courier New', monospace; font-size: 14px; white-space: pre; }
        #command-input { flex: 1; background-color: #000; color: #33ff33; border: none; padding: 5px; font-family: 'Courier New', monospace; font-size: 14px; }
        #command-input:focus { outline: none; }
    </style>
</head>
<body>
    <div class="mode-selector">
        <button id="switch-mode-btn">スイッチモード</button>
        <button id="router-mode-btn" class="active">ルーターモード</button>
    </div>
    
    <div class="terminal-container">
        <div id="terminal"></div>
        <div class="input-area">
            <span id="prompt">Router&gt;</span>
            <input type="text" id="command-input" autofocus="" autocomplete="off">
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const terminal = document.getElementById('terminal');
            const promptSpan = document.getElementById('prompt');
            const commandInput = document.getElementById('command-input');
            const inputArea = document.querySelector('.input-area');
            const switchModeBtn = document.getElementById('switch-mode-btn');
            const routerModeBtn = document.getElementById('router-mode-btn');

            window.onerror = function (message, source, lineno, colno, error) {
                console.error('エラー:', message, source, lineno); return true;
            };

            const urlParams = new URLSearchParams(window.location.search);
            const paramType = urlParams.get('type'); 
            const paramHostname = urlParams.get('hostname');

            let deviceType = paramType === 'switch' ? 'switch' : 'router';
            const initialHostname = paramHostname ? paramHostname : (deviceType === 'switch' ? 'Switch' : 'Router');

            let commandHistory = [];
            let historyIndex = 0;
            let isInitialized = false;

            const defaultSwitchInterfaces = { "Ethernet0/0": {}, "Ethernet0/1": {}, "Ethernet0/2": {}, "Ethernet0/3": {}, "GigabitEthernet0/1": {} };
            const defaultRouterInterfaces = { "Ethernet0/0": {}, "Ethernet0/1": {}, "GigabitEthernet0/0": {}, "GigabitEthernet0/1": {} };

            const initialSwitchState = {
                mode: 'user', hostname: initialHostname, awaitingInput: null,
                screenLog: [], commandHistory: [],
                interfaces: JSON.parse(JSON.stringify(defaultSwitchInterfaces)), 
                vlans: { '1': { name: 'default', status: 'active' } },
                currentInterface: null, currentInterfaceRange: [], currentVlan: null, currentLine: null, currentAcl: null, currentRouterProcess: null, configStack: [],
                cdpEnabled: true, runningConfig: {
                    hostname: initialHostname, 
                    interfaces: JSON.parse(JSON.stringify(defaultSwitchInterfaces)), 
                    vlans: { '1': { name: 'default', status: 'active' } },
                    security: { users: {}, portSecurity: {}, sshKeysGenerated: false },
                    lines: {}, acls: {}, cdp: { enabled: true, interfaces: {} },
                    lldp: { enabled: false, interfaces: {} },
                    ntp: { server: null },
                    dhcpSnooping: { enabled: false, vlans: [], verifyMac: false }, logs: [], startupConfig: null
                }
            };

            const initialRouterState = {
                mode: 'user', hostname: initialHostname, awaitingInput: null,
                screenLog: [], commandHistory: [],
                interfaces: JSON.parse(JSON.stringify(defaultRouterInterfaces)), 
                currentInterface: null, currentInterfaceRange: [], currentLine: null, currentAcl: null, currentRouterProcess: null, configStack: [],
                cdpEnabled: true, runningConfig: {
                    hostname: initialHostname, 
                    interfaces: JSON.parse(JSON.stringify(defaultRouterInterfaces)), 
                    routing: { staticRoutes: [], ospf: {} },
                    security: { users: {}, portSecurity: {}, sshKeysGenerated: false },
                    lines: {}, acls: {}, cdp: { enabled: true, interfaces: {} },
                    lldp: { enabled: false, interfaces: {} },
                    ntp: { server: null },
                    nat: { insideSourceList: null, interfaceOverload: null }, logs: [], startupConfig: null
                }
            };

            let deviceState = JSON.parse(JSON.stringify(deviceType === 'switch' ? initialSwitchState : initialRouterState));

            function appendToTerminal(text) {
                if (!deviceState.screenLog) deviceState.screenLog = [];
                deviceState.screenLog.push(text);
                if (deviceState.screenLog.length > 5000) deviceState.screenLog.shift();

                const div = document.createElement('div');
                div.style.whiteSpace = 'pre-wrap';
                div.textContent = text;
                terminal.appendChild(div);
                while (terminal.childNodes.length > 5000) terminal.removeChild(terminal.firstChild);
                terminal.scrollTop = terminal.scrollHeight;
            }

            function renderTerminal() {
                terminal.innerHTML = '';
                if (deviceState.screenLog && deviceState.screenLog.length > 0) {
                    deviceState.screenLog.forEach(text => {
                        const div = document.createElement('div');
                        div.style.whiteSpace = 'pre-wrap';
                        div.textContent = text;
                        terminal.appendChild(div);
                    });
                } else {
                    appendToTerminal(deviceType === 'switch' ? 'Cisco IOS Software, C2960...' : 'Cisco IOS Software, C1900...');
                    appendToTerminal('Press ENTER to continue...');
                }
                terminal.scrollTop = terminal.scrollHeight;
            }

            function clearTerminal() { 
                terminal.innerHTML = ''; 
                if (deviceState) deviceState.screenLog = [];
            }
            
            function initializeEngine() {
                if (isInitialized) return;
                isInitialized = true;
                
                if (deviceType === 'switch') {
                    switchModeBtn.classList.add('active');
                    routerModeBtn.classList.remove('active');
                } else {
                    routerModeBtn.classList.add('active');
                    switchModeBtn.classList.remove('active');
                }

                renderTerminal();
                updatePrompt();
                
                inputArea.style.visibility = 'visible';
                commandInput.focus();
            }

            function updatePrompt() {
                if (deviceState.awaitingInput === 'ospf_clear') {
                    promptSpan.textContent = 'Reset ALL OSPF processes? [no]: ';
                    return;
                }
                if (deviceState.awaitingInput === 'copy_run_start') {
                    promptSpan.textContent = 'Destination filename [startup-config]? ';
                    return;
                }

                let prompt = deviceState.hostname;
                switch (deviceState.mode) {
                    case 'user': prompt += '>'; break;
                    case 'privileged': prompt += '#'; break;
                    case 'config': prompt += '(config)#'; break;
                    case 'interface': prompt += '(config-if)#'; break;
                    case 'interface-range': prompt += '(config-if-range)#'; break;
                    case 'vlan': prompt += '(config-vlan)#'; break;
                    case 'line': prompt += '(config-line)#'; break;
                    case 'acl': prompt += '(config-ext-nacl)#'; break;
                    case 'router': prompt += '(config-router)#'; break;
                }
                promptSpan.textContent = prompt;
            }

            function switchToDeviceMode(mode) {
                if (mode === 'switch') {
                    deviceType = 'switch'; 
                    deviceState = JSON.parse(JSON.stringify(initialSwitchState));
                    switchModeBtn.classList.add('active'); routerModeBtn.classList.remove('active');
                } else {
                    deviceType = 'router'; 
                    deviceState = JSON.parse(JSON.stringify(initialRouterState));
                    routerModeBtn.classList.add('active'); switchModeBtn.classList.remove('active');
                }
                
                commandHistory = [];
                historyIndex = 0;

                if (!isInitialized) initializeEngine();
                else {
                    clearTerminal();
                    renderTerminal();
                    updatePrompt();
                }
            }
            
            function onResetConfirmed() {
                deviceState = JSON.parse(JSON.stringify(deviceType === 'switch' ? initialSwitchState : initialRouterState));
                clearTerminal();
                appendToTerminal(deviceType === 'switch' ? 'Cisco IOS Software, C2960...' : 'Cisco IOS Software, C1900...');
                appendToTerminal('Press ENTER to continue...');
                updatePrompt();
                commandHistory = [];
                commandInput.focus();
            }

            function normalizeInterfaceName(input) {
                const match = input.trim().match(/^([a-zA-Z-]+)\s*(.*)$/);
                if (!match) return input;
                let prefix = match[1].toLowerCase();
                if (prefix.startsWith('fa')) prefix = 'FastEthernet';
                else if (prefix.startsWith('gi')) prefix = 'GigabitEthernet';
                else if (prefix.startsWith('se')) prefix = 'Serial';
                else if (prefix.startsWith('vl')) prefix = 'Vlan';
                else if (prefix.startsWith('lo')) prefix = 'Loopback';
                else if (prefix.startsWith('tu')) prefix = 'Tunnel';
                else if (prefix.startsWith('e')) prefix = 'Ethernet';
                return prefix + match[2];
            }

            function parseInterfaceRange(rangeStr) {
                const interfaces = [];
                const parts = rangeStr.split(',');
                for (let part of parts) {
                    part = part.trim();
                    if (part.includes('-')) {
                        const [startStr, endStr] = part.split('-').map(s => s.trim());
                        const match = normalizeInterfaceName(startStr).match(/^([a-zA-Z-]+[\d\/]+\/)?(\d+)$/);
                        if (match) {
                            const prefix = match[1] || '';
                            const startNum = parseInt(match[2]);
                            const endMatch = endStr.match(/\d+$/);
                            const endNum = endMatch ? parseInt(endMatch[0]) : startNum;
                            for (let i = startNum; i <= endNum; i++) interfaces.push(`${prefix}${i}`);
                        }
                    } else {
                        interfaces.push(normalizeInterfaceName(part));
                    }
                }
                return interfaces;
            }

            const physicalPortRegex = /^(Ethernet|FastEthernet|GigabitEthernet|Serial|TenGigabitEthernet)/;

            const commandVocabulary = {
                'user': ['enable', 'ping', 'traceroute', 'ssh', 'show', 'sh', 'exit'],
                'privileged': ['configure', 'terminal', 'copy', 'write', 'show', 'sh', 'ping', 'traceroute', 'exit', 'vlan', 'delete', 'erase', 'clear'],
                'config': ['hostname', 'interface', 'ip', 'ipv6', 'username', 'line', 'vlan', 'cdp', 'lldp', 'no', 'exit', 'end', 'ntp', 'router'],
                'interface': ['ip', 'ipv6', 'shutdown', 'shut', 'no', 'switchport', 'channel-group', 'cdp', 'lldp', 'exit', 'end', 'description'],
                'interface-range': ['ip', 'ipv6', 'shutdown', 'shut', 'no', 'switchport', 'channel-group', 'cdp', 'lldp', 'exit', 'end', 'description'],
                'vlan': ['name', 'exit', 'end', 'no'],
                'line': ['transport', 'login', 'password', 'exit', 'end', 'no'],
                'acl': ['permit', 'deny', 'remark', 'no', 'exit', 'end'],
                'router': ['router-id', 'network', 'passive-interface', 'default-information', 'exit', 'end', 'no']
            };

            function handleTabCompletion(e) {
                if (deviceState.awaitingInput) {
                    e.preventDefault();
                    return;
                }
                
                e.preventDefault();
                const currentInput = commandInput.value;
                const mode = deviceState.mode;
                const words = currentInput.split(' ');
                const lastWord = words[words.length - 1];
                if (!lastWord) return;

                let candidates = [];

                if (words.length === 2 && words[0].startsWith('conf')) {
                    candidates = ['terminal'].filter(cmd => cmd.startsWith(lastWord));
                } else if (words.length === 2 && words[0] === 'lldp') {
                    candidates = ['transmit', 'receive'].filter(cmd => cmd.startsWith(lastWord));
                } else if (words.length === 3 && words[0] === 'no' && words[1] === 'lldp') {
                    candidates = ['transmit', 'receive'].filter(cmd => cmd.startsWith(lastWord));
                } else if (words.length === 3 && words[0] === 'no' && words[1] === 'logging') {
                    candidates = ['console'].filter(cmd => cmd.startsWith(lastWord));
                } else if (words.length === 2 && words[0] === 'clear') {
                    candidates = ['ip'].filter(cmd => cmd.startsWith(lastWord));
                } else if (words.length === 3 && words[0] === 'clear' && words[1] === 'ip') {
                    candidates = ['ospf'].filter(cmd => cmd.startsWith(lastWord));
                } else if (words.length === 4 && words[0] === 'clear' && words[1] === 'ip' && words[2] === 'ospf') {
                    candidates = ['process'].filter(cmd => cmd.startsWith(lastWord));
                } else if (words.length === 2 && words[0] === 'router') {
                    candidates = ['ospf', 'rip', 'eigrp'].filter(cmd => cmd.startsWith(lastWord));
                } else if (words.length === 2 && (words[0] === 'show' || words[0] === 'sh')) {
                    candidates = ['ip', 'running-config', 'vlan', 'mac-address-table'].filter(cmd => cmd.startsWith(lastWord));
                } else if (words.length === 3 && (words[0] === 'show' || words[0] === 'sh') && words[1] === 'ip') {
                    candidates = ['nat', 'route', 'interface', 'ospf'].filter(cmd => cmd.startsWith(lastWord));
                } else if (words.length === 4 && (words[0] === 'show' || words[0] === 'sh') && words[1] === 'ip' && words[2] === 'nat') {
                    candidates = ['translations'].filter(cmd => cmd.startsWith(lastWord));
                } else if (words.length === 4 && (words[0] === 'show' || words[0] === 'sh') && words[1] === 'ip' && (words[2] === 'interface' || words[2] === 'int')) {
                    candidates = ['brief'].filter(cmd => cmd.startsWith(lastWord));
                } else if (words.length === 2 && (words[0] === 'interface' || words[0] === 'int')) {
                    candidates = ['range'].filter(cmd => cmd.startsWith(lastWord));
                } else if (words.length === 2 && (words[0] === 'ip' || words[0] === 'ipv6')) {
                    candidates = ['address', 'access-list', 'route', 'nat', 'ssh', 'dhcp', 'ospf'].filter(cmd => cmd.startsWith(lastWord));
                } else if (words.length === 3 && words[0] === 'ip' && words[1] === 'access-list') {
                    candidates = ['extended', 'standard'].filter(cmd => cmd.startsWith(lastWord));
                } else if (words.length === 3 && words[0] === 'ip' && words[1] === 'ospf') {
                    candidates = ['priority'].filter(cmd => cmd.startsWith(lastWord));
                } else if (words.length === 2 && words[0] === 'transport') {
                    candidates = ['input'].filter(cmd => cmd.startsWith(lastWord));
                } else if (words.length === 3 && words[0] === 'transport' && words[1] === 'input') {
                    candidates = ['telnet', 'ssh', 'all', 'none'].filter(cmd => cmd.startsWith(lastWord));
                } else if (words.length === 2 && words[0] === 'switchport') {
                    candidates = ['mode', 'access', 'trunk', 'voice', 'port-security'].filter(cmd => cmd.startsWith(lastWord));
                } else if (words.length === 3 && words[0] === 'switchport' && words[1] === 'mode') {
                    candidates = ['access', 'trunk'].filter(cmd => cmd.startsWith(lastWord));
                } else if (words.length === 3 && words[0] === 'switchport' && words[1] === 'access') {
                    candidates = ['vlan'].filter(cmd => cmd.startsWith(lastWord));
                } else if (words.length === 3 && words[0] === 'switchport' && words[1] === 'trunk') {
                    candidates = ['encapsulation', 'allowed', 'native'].filter(cmd => cmd.startsWith(lastWord));
                } else if (words.length === 4 && words[0] === 'switchport' && words[1] === 'trunk' && words[2] === 'encapsulation') {
                    candidates = ['dot1q'].filter(cmd => cmd.startsWith(lastWord));
                } else if (words.length === 4 && words[0] === 'switchport' && words[1] === 'trunk' && words[2] === 'allowed') {
                    candidates = ['vlan'].filter(cmd => cmd.startsWith(lastWord));
                } else if (words.length === 4 && words[0] === 'switchport' && words[1] === 'trunk' && words[2] === 'native') {
                    candidates = ['vlan'].filter(cmd => cmd.startsWith(lastWord));
                } else if (words.length === 1) {
                    const vocab = commandVocabulary[mode] || [];
                    candidates = vocab.filter(cmd => cmd.startsWith(lastWord));
                }

                if (candidates.length === 1) {
                    words[words.length - 1] = candidates[0];
                    commandInput.value = words.join(' ') + ' ';
                }
            }

            function handleSshCommand(args) {
                if (args.length < 2) { appendToTerminal('% Incomplete command.'); return; }
                let user = null; let targetIp = null;
                for (let i = 1; i < args.length; i++) {
                    if (args[i] === '-l') { 
                        if (i + 1 >= args.length) { appendToTerminal('% Incomplete command.'); return; }
                        user = args[i + 1]; i++; 
                    } else if (!args[i].startsWith('-')) { targetIp = args[i]; }
                }
                if (!user || !targetIp) { appendToTerminal('% Incomplete command.'); return; }
                appendToTerminal(`Trying ${targetIp} ...`);
                window.parent.postMessage({ type: 'SSH_CHECK', targetIp: targetIp, user: user, sourceDeviceName: deviceState.hostname }, '*');
            }

            function processUserModeCommand(mainCommand, args) {
                if (mainCommand.startsWith('en')) { deviceState.mode = 'privileged'; updatePrompt(); return; }
                if (mainCommand === 'exit') {
                     if (deviceState.isSshSession) { window.parent.postMessage({ type: 'SSH_EXIT' }, '*'); return; }
                     appendToTerminal('Connection closed by foreign host.');
                }
                else if (mainCommand === 'ping' || mainCommand === 'traceroute') {
                    if (args.length < 2) { appendToTerminal('% Incomplete command.'); return; }
                    
                    if (!deviceState.runningConfig.logs) {
                        deviceState.runningConfig.logs = [];
                    }
                    deviceState.runningConfig.logs.push({ command: mainCommand, target: args[1], timestamp: Date.now() });
                    
                    appendToTerminal('Type escape sequence to abort.');
                    if (mainCommand === 'ping') {
                        appendToTerminal(`Sending 5, 100-byte ICMP Echos to ${args[1]}, timeout is 2 seconds:`);
                        appendToTerminal('!!!!!');
                        appendToTerminal('Success rate is 100 percent (5/5), round-trip min/avg/max = 1/2/4 ms');
                    } else {
                        appendToTerminal(`Tracing the route to ${args[1]}`);
                        appendToTerminal(`  1 ${args[1]} 10 msec 10 msec 10 msec`);
                    }

                    if (args[1] === '209.165.200.224' || args[1] === '10.200.220.6') {
                        window.parent.postMessage({ type: mainCommand === 'ping' ? 'PING_CHECK' : 'TRACEROUTE_CHECK', targetIp: args[1], sourceDeviceName: deviceState.hostname, currentState: JSON.parse(JSON.stringify(deviceState)) }, '*');
                    }
                }
                else if (mainCommand === 'show' || mainCommand === 'sh') {
                    appendToTerminal('% Function not fully simulated in user mode.');
                }
                else if (mainCommand === 'ssh') handleSshCommand(args);
                else appendToTerminal('% Invalid input detected at \'^\'');
                updatePrompt();
            }

            function processPrivilegedModeCommand(mainCommand, args) {
                if (mainCommand.startsWith('conf')) { deviceState.mode = 'config'; deviceState.configStack.push('privileged'); appendToTerminal('Enter configuration commands, one per line.  End with CNTL/Z.'); }
                else if (mainCommand === 'exit') deviceState.mode = 'user';
                else if (mainCommand === 'clear') {
                    if (args.length >= 4 && args[1] === 'ip' && args[2] === 'ospf' && (args[3] === 'process' || args[3] === 'proc')) {
                        deviceState.awaitingInput = 'ospf_clear';
                    } else {
                        appendToTerminal('% Invalid input detected at \'^\'');
                    }
                }
                else if (mainCommand === 'copy') {
                    if (args.length >= 3) {
                         const src = args[1]; const dst = args[2];
                         if ((src === 'run' || src === 'running-config') && (dst === 'start' || dst === 'startup-config')) {
                            deviceState.awaitingInput = 'copy_run_start';
                         } else { appendToTerminal('% Invalid input detected at \'^\''); }
                     } else { appendToTerminal('% Incomplete command.'); }
                }
                else if (mainCommand === 'write' || mainCommand === 'wr') {
                    appendToTerminal('Building configuration...'); appendToTerminal('[OK]');
                    deviceState.runningConfig.startupConfig = JSON.parse(JSON.stringify(deviceState.runningConfig));
                }
                else if (mainCommand === 'show' || mainCommand === 'sh') {
                    if (args.length < 2) { appendToTerminal('% Incomplete command.'); }
                    else if (args[1] === 'run' || args[1] === 'running-config') {
                        appendToTerminal(`hostname ${deviceState.runningConfig.hostname}`);
                        if (deviceState.runningConfig.lldp && deviceState.runningConfig.lldp.enabled) appendToTerminal('lldp run');
                        Object.keys(deviceState.runningConfig.security.users).forEach(u => {
                            const usr = deviceState.runningConfig.security.users[u];
                            if(usr.algorithm === 'scrypt') appendToTerminal(`username ${u} privilege ${usr.privilege} algorithm-type scrypt secret ${usr.password}`);
                            else appendToTerminal(`username ${u} privilege ${usr.privilege} password ${usr.password}`);
                        });
                        Object.keys(deviceState.runningConfig.interfaces).forEach(i => {
                             const intf = deviceState.runningConfig.interfaces[i];
                             appendToTerminal(`interface ${i}`);
                             if(intf.switchport && intf.switchport.access_vlan) appendToTerminal(` switchport access vlan ${intf.switchport.access_vlan}`);
                             if(intf.ip) appendToTerminal(` ip address ${intf.ip} ${intf.mask}`);
                             if(intf.ipv6) appendToTerminal(` ipv6 address ${intf.ipv6}`);
                             if (deviceState.runningConfig.lldp && deviceState.runningConfig.lldp.interfaces && deviceState.runningConfig.lldp.interfaces[i]) {
                                 if (deviceState.runningConfig.lldp.interfaces[i].transmit === false) appendToTerminal(' no lldp transmit');
                                 if (deviceState.runningConfig.lldp.interfaces[i].receive === false) appendToTerminal(' no lldp receive');
                             }
                             if(intf.status === 'shutdown') appendToTerminal(' shutdown');
                        });
                        appendToTerminal('end');
                    } else if (args[1] === 'vlan') {
                        appendToTerminal('VLAN Name                             Status    Ports');
                        Object.keys(deviceState.runningConfig.vlans).forEach(id => appendToTerminal(`${id.padEnd(4)} ${deviceState.runningConfig.vlans[id].name}`));
                    } else if (args[1] === 'lldp' || args[1] === 'cdp') {
                        appendToTerminal('% Function not fully simulated in show command.');
                    } 
                    else if (args[1] === 'ip' && (args[2] === 'interface' || args[2] === 'int') && (args[3] === 'brief' || args[3] === 'br')) {
                        appendToTerminal('Interface              IP-Address      OK? Method Status                Protocol');
                        Object.keys(deviceState.runningConfig.interfaces).forEach(i => {
                            const intf = deviceState.runningConfig.interfaces[i];
                            const ip = intf.ip || 'unassigned';
                            const method = intf.ip ? 'manual' : 'unset ';
                            const status = intf.status === 'shutdown' ? 'administratively down' : 'up';
                            const protocol = intf.status === 'shutdown' ? 'down' : 'up';
                            appendToTerminal(`${i.padEnd(22)} ${ip.padEnd(15)} YES ${method} ${status.padEnd(21)} ${protocol}`);
                        });
                    }
                    else if (args[1] === 'ip' && args[2] === 'nat') {
                        if (args.length < 4) {
                            appendToTerminal('% Incomplete command.');
                        } else if (args[3].startsWith('trans')) { 
                            appendToTerminal('Pro Inside global      Inside local       Outside local      Outside global');
                            if (deviceState.runningConfig.nat && (deviceState.runningConfig.nat.insideSourceList || deviceState.runningConfig.nat.interfaceOverload)) {
                                appendToTerminal('icmp 209.165.200.225:1234 192.168.1.10:1234 10.200.220.6:1234  10.200.220.6:1234');
                            }
                        } else {
                            appendToTerminal('% Invalid input detected at \'^\'');
                        }
                    } 
                    else { appendToTerminal('% Invalid input detected at \'^\''); }
                }
                else if (mainCommand === 'ping' || mainCommand === 'traceroute') {
                    if (args.length < 2) { appendToTerminal('% Incomplete command.'); }
                    else {
                        if (!deviceState.runningConfig.logs) {
                            deviceState.runningConfig.logs = [];
                        }
                        deviceState.runningConfig.logs.push({ command: mainCommand, target: args[1], timestamp: Date.now() });
                        
                        appendToTerminal('Type escape sequence to abort.');
                        if (mainCommand === 'ping') {
                            appendToTerminal(`Sending 5, 100-byte ICMP Echos to ${args[1]}, timeout is 2 seconds:`);
                            appendToTerminal('!!!!!');
                            appendToTerminal('Success rate is 100 percent (5/5), round-trip min/avg/max = 1/2/4 ms');
                        } else {
                            appendToTerminal(`Tracing the route to ${args[1]}`);
                            appendToTerminal(`  1 ${args[1]} 10 msec 10 msec 10 msec`);
                        }

                        if (args[1] === '209.165.200.224' || args[1] === '10.200.220.6') {
                            window.parent.postMessage({ type: mainCommand === 'ping' ? 'PING_CHECK' : 'TRACEROUTE_CHECK', targetIp: args[1], sourceDeviceName: deviceState.hostname, currentState: JSON.parse(JSON.stringify(deviceState)) }, '*');
                        }
                    }
                }
                else if (mainCommand === 'ssh') handleSshCommand(args);
                else appendToTerminal('% Invalid input detected at \'^\'');
                updatePrompt();
            }

            function processRouterModeCommand(mainCommand, args) {
                const processId = deviceState.currentRouterProcess;
                if (!deviceState.runningConfig.routing.ospf[processId]) deviceState.runningConfig.routing.ospf[processId] = { networks: [] };
                
                if (mainCommand === 'router-id') {
                    if (args.length < 2) { appendToTerminal('% Incomplete command.'); return; }
                    deviceState.runningConfig.routing.ospf[processId].routerId = args[1];
                } else if (mainCommand === 'network') {
                    if (args.length < 5 || args[3].toLowerCase() !== 'area') { appendToTerminal('% Incomplete command.'); return; }
                    if (!deviceState.runningConfig.routing.ospf[processId].networks) {
                        deviceState.runningConfig.routing.ospf[processId].networks = [];
                    }
                    
                    const exists = deviceState.runningConfig.routing.ospf[processId].networks.some(
                        n => n.ip === args[1] && n.wildcard === args[2] && n.area === args[4]
                    );
                    if (!exists) {
                        deviceState.runningConfig.routing.ospf[processId].networks.push({
                            ip: args[1], wildcard: args[2], area: args[4]
                        });
                    }
                } else if (mainCommand === 'exit') {
                    deviceState.mode = deviceState.configStack.pop() || 'config';
                    updatePrompt();
                } else if (mainCommand === 'end') {
                    deviceState.mode = 'privileged'; deviceState.configStack = []; updatePrompt();
                } else {
                    appendToTerminal('% Invalid input detected at \'^\'');
                }
            }

            function processConfigModeCommand(mainCommand, args) {
                switch (mainCommand) {
                    case 'hostname': 
                        if(args[1]) { deviceState.hostname = args[1]; deviceState.runningConfig.hostname = args[1]; updatePrompt(); }
                        else { appendToTerminal('% Incomplete command.'); }
                        break;
                    case 'router':
                        if (args[1] === 'ospf') {
                            if (args.length < 3) { appendToTerminal('% Incomplete command.'); break; }
                            const processId = args[2];
                            deviceState.mode = 'router';
                            deviceState.configStack.push('config');
                            deviceState.currentRouterProcess = processId;
                            if (!deviceState.runningConfig.routing) deviceState.runningConfig.routing = { staticRoutes: [], ospf: {} };
                            if (!deviceState.runningConfig.routing.ospf) deviceState.runningConfig.routing.ospf = {};
                            if (!deviceState.runningConfig.routing.ospf[processId]) deviceState.runningConfig.routing.ospf[processId] = { networks: [] };
                            updatePrompt();
                        } else { appendToTerminal('% Invalid input detected at \'^\''); }
                        break;
                    case 'int': case 'interface':
                        if (args.length < 2) { appendToTerminal('% Incomplete command.'); break; }
                        if (args[1] === 'range') {
                            if (args.length < 3) { appendToTerminal('% Incomplete command.'); break; }
                            const targets = parseInterfaceRange(args.slice(2).join(' '));
                            const invalidPorts = targets.filter(t => physicalPortRegex.test(t) && !deviceState.runningConfig.interfaces[t]);
                            if (invalidPorts.length > 0) { appendToTerminal('% Invalid interface type and number'); break; }
                            targets.forEach(n => { if(!deviceState.runningConfig.interfaces[n]) deviceState.runningConfig.interfaces[n] = {}; });
                            deviceState.mode = 'interface-range'; deviceState.configStack.push('config'); deviceState.currentInterfaceRange = targets;
                        } else {
                            const name = normalizeInterfaceName(args.slice(1).join(' '));
                            if (physicalPortRegex.test(name)) {
                                if (!deviceState.runningConfig.interfaces[name]) { appendToTerminal('% Invalid interface type and number'); break; }
                            } else {
                                if(!deviceState.runningConfig.interfaces[name]) deviceState.runningConfig.interfaces[name] = {};
                            }
                            deviceState.mode = 'interface'; deviceState.configStack.push('config'); deviceState.currentInterface = name;
                        }
                        updatePrompt();
                        break;
                    case 'username': { 
                        if (args.length < 4) { appendToTerminal('% Incomplete command.'); break; }
                        const arg2 = args[2] ? args[2].toLowerCase() : '';
                        const arg4 = args[4] ? args[4].toLowerCase() : '';
                        const arg6 = args[6] ? args[6].toLowerCase() : '';
                        if (args.length >= 8 && arg2 === 'privilege' && arg4 === 'algorithm-type' && arg6 === 'secret') {
                            deviceState.runningConfig.security.users[args[1]] = { privilege: parseInt(args[3]), password: args[7], algorithm: args[5].toLowerCase() };
                        } else if (args.length >= 6 && arg2 === 'privilege' && arg4 === 'secret') {
                            deviceState.runningConfig.security.users[args[1]] = { privilege: parseInt(args[3]), password: args[5], algorithm: 'md5' };
                        } else if (args.length >= 6 && arg2 === 'privilege' && arg4 === 'password') {
                            deviceState.runningConfig.security.users[args[1]] = { privilege: parseInt(args[3]), password: args[5], algorithm: 'clear' };
                        } else { appendToTerminal('% Incomplete command.'); }
                        break;
                    }
                    case 'vlan':
                        if (args[1]) {
                            deviceState.mode = 'vlan'; deviceState.configStack.push('config'); deviceState.currentVlan = args[1];
                            if (!deviceState.runningConfig.vlans[args[1]]) deviceState.runningConfig.vlans[args[1]] = { name: `VLAN${args[1]}`, status: 'active' };
                            updatePrompt();
                        } else { appendToTerminal('% Incomplete command.'); }
                        break;
                    case 'cdp': 
                         if (args[1] === 'run') {
                             if (!deviceState.runningConfig.cdp) deviceState.runningConfig.cdp = { enabled: true, interfaces: {} };
                             deviceState.runningConfig.cdp.enabled = true;
                         } else appendToTerminal('% Incomplete command.');
                         break;
                    case 'lldp':
                         if (args[1] === 'run') {
                             if (!deviceState.runningConfig.lldp) deviceState.runningConfig.lldp = { enabled: false, interfaces: {} };
                             deviceState.runningConfig.lldp.enabled = true;
                         } else appendToTerminal('% Incomplete command.');
                         break;
                    case 'no': 
                         if (args[1] === 'cdp') {
                             if (!deviceState.runningConfig.cdp) deviceState.runningConfig.cdp = { enabled: true, interfaces: {} };
                             deviceState.runningConfig.cdp.enabled = false;
                         }
                         else if (args[1] === 'lldp' && args[2] === 'run') {
                             if (!deviceState.runningConfig.lldp) deviceState.runningConfig.lldp = { enabled: false, interfaces: {} };
                             deviceState.runningConfig.lldp.enabled = false;
                         }
                         else if (args[1] === 'logging' && args[2] === 'console') {
                             // 問題8のTips対策
                         }
                         else appendToTerminal('% Incomplete command.');
                         break;
                    case 'ip':
                        if (args.length < 2) { appendToTerminal('% Incomplete command.'); break; }
                        if (args[1] === 'route') {
                            if (args.length < 5) { appendToTerminal('% Incomplete command.'); break; }
                            if (!deviceState.runningConfig.routing) deviceState.runningConfig.routing = { staticRoutes: [] };
                            deviceState.runningConfig.routing.staticRoutes.push({ destination: args[2], mask: args[3], nextHop: args[4], distance: args[5] ? parseInt(args[5]) : 1 });
                        } else if (args[1] === 'nat') {
                             if (args.length < 9) { appendToTerminal('% Incomplete command.'); break; }
                            if (!deviceState.runningConfig.nat) deviceState.runningConfig.nat = {};
                            deviceState.runningConfig.nat.insideSourceList = args[5]; deviceState.runningConfig.nat.interfaceOverload = normalizeInterfaceName(args[7]);
                        } else if (args[1] === 'ssh') {
                            if (args[2] === 'version') {
                                if (args.length < 4) { appendToTerminal('% Incomplete command.'); break; }
                                deviceState.runningConfig.security.sshVersion = parseInt(args[3]);
                            } else { appendToTerminal('% Incomplete command.'); }
                        } else if (args[1] === 'access-list') {
                            if (args.length < 4) { appendToTerminal('% Incomplete command.'); break; }
                            const name = args[3];
                            deviceState.mode = 'acl'; deviceState.configStack.push('config'); deviceState.currentAcl = name;
                            if (!deviceState.runningConfig.acls[name]) deviceState.runningConfig.acls[name] = { type: args[2], entries: [] };
                            updatePrompt();
                        } else if (args[1] === 'dhcp' && args[2] === 'snooping') {
                             if (!deviceState.runningConfig.dhcpSnooping) deviceState.runningConfig.dhcpSnooping = { enabled: false, vlans: [], verifyMac: false };
                             if (args.length === 3) deviceState.runningConfig.dhcpSnooping.enabled = true;
                             else if (args[3] === 'vlan') {
                                 args[4].split(',').forEach(id => { if (!deviceState.runningConfig.dhcpSnooping.vlans.includes(id)) deviceState.runningConfig.dhcpSnooping.vlans.push(id); });
                             } else if (args[3] === 'verify' && args[4] === 'mac-address') deviceState.runningConfig.dhcpSnooping.verifyMac = true;
                        } else { appendToTerminal('% Invalid input detected at \'^\''); }
                        break;
                    case 'line':
                        if (args[1] === 'vty') {
                            deviceState.mode = 'line'; deviceState.configStack.push('config'); deviceState.currentLine = 'vty 0 4';
                            if (!deviceState.runningConfig.lines['vty 0 4']) deviceState.runningConfig.lines['vty 0 4'] = { transport: { input: [] } };
                            updatePrompt();
                        } else { appendToTerminal('% Incomplete command.'); }
                        break;
                    case 'ntp': 
                        if (args[1] === 'server') { 
                            if(args.length < 3) { appendToTerminal('% Incomplete command.'); break; }
                            if (!deviceState.runningConfig.ntp) deviceState.runningConfig.ntp = {}; deviceState.runningConfig.ntp.server = args[2]; 
                        } else { appendToTerminal('% Invalid input detected at \'^\''); }
                        break;
                    case 'exit': deviceState.mode = deviceState.configStack.pop() || 'privileged'; updatePrompt(); break;
                    case 'end': deviceState.mode = 'privileged'; deviceState.configStack = []; updatePrompt(); break;
                    default: appendToTerminal('% Invalid input detected at \'^\'');
                }
            }

            function processInterfaceModeCommand(mainCommand, args) {
                let targets = deviceState.mode === 'interface-range' ? deviceState.currentInterfaceRange : [deviceState.currentInterface];
                if (mainCommand === 'exit') { deviceState.mode = deviceState.configStack.pop(); updatePrompt(); return; }
                if (mainCommand === 'end') { deviceState.mode = 'privileged'; deviceState.configStack = []; updatePrompt(); return; }

                let commandFound = false; let incomplete = false;

                for (const name of targets) {
                    const conf = deviceState.runningConfig.interfaces[name];
                    if (!conf) continue;
                    if (!conf.switchport) conf.switchport = { mode: 'dynamic', access_vlan: '1' };
                    
                    switch (mainCommand) {
                        case 'shutdown': 
                        case 'shut':
                            conf.status = 'shutdown'; commandFound = true; break;
                        case 'no':
                            if (args.length < 2) { incomplete = true; break; }
                            if (args[1] === 'shutdown' || args[1] === 'shut') {
                                conf.status = 'up'; 
                                commandFound = true;
                            }
                            else if (args[1] === 'cdp') {
                                if (deviceState.runningConfig.cdp && deviceState.runningConfig.cdp.interfaces) deviceState.runningConfig.cdp.interfaces[name] = false;
                                commandFound = true;
                            }
                            else if (args[1] === 'lldp') {
                                if (args.length < 3) { incomplete = true; break; }
                                if (args[2] === 'transmit' || args[2] === 'receive') {
                                    if (!deviceState.runningConfig.lldp) deviceState.runningConfig.lldp = { enabled: false, interfaces: {} };
                                    if (!deviceState.runningConfig.lldp.interfaces) deviceState.runningConfig.lldp.interfaces = {};
                                    if (!deviceState.runningConfig.lldp.interfaces[name]) deviceState.runningConfig.lldp.interfaces[name] = { transmit: true, receive: true };

                                    if (args[2] === 'transmit') deviceState.runningConfig.lldp.interfaces[name].transmit = false;
                                    else if (args[2] === 'receive') deviceState.runningConfig.lldp.interfaces[name].receive = false;
                                    commandFound = true;
                                }
                            }
                            break;
                        case 'channel-group':
                            if (args.length < 4 || args[2] !== 'mode') { incomplete = true; break; }
                            if (!conf.channelGroup) conf.channelGroup = {};
                            conf.channelGroup.id = args[1];
                            conf.channelGroup.mode = args[3];
                            commandFound = true; break;
                        case 'switchport':
                            if (args.length < 2) { incomplete = true; break; }
                            if (args[1] === 'mode') {
                                if (args.length < 3) { incomplete = true; break; }
                                conf.switchport.mode = args[2];
                            } else if (args[1] === 'access') {
                                if (args.length < 4 || args[2] !== 'vlan') { incomplete = true; break; } 
                                conf.switchport.access_vlan = args[3];
                            } else if (args[1] === 'voice') {
                                if (args.length < 4 || args[2] !== 'vlan') { incomplete = true; break; } 
                                conf.switchport.voice_vlan = args[3];
                            } else if (args[1] === 'trunk') {
                                if (args.length < 3) { incomplete = true; break; }
                                if (args[2] === 'encapsulation') {
                                    if (args.length < 4) { incomplete = true; break; }
                                    conf.switchport.encapsulation = args[3];
                                } else if (args[2] === 'allowed') {
                                    let vlansStr = '';
                                    if (args[3] === 'vlan' && args[4]) {
                                        vlansStr = args[4];
                                    } else if (args[3] && args[3] !== 'vlan') {
                                        vlansStr = args[3];
                                    }
                                    if (vlansStr) {
                                        conf.switchport.allowed_vlans = vlansStr.split(',');
                                    } else {
                                        incomplete = true; break;
                                    }
                                } else if (args[2] === 'native') {
                                    if (args.length < 5 || args[3] !== 'vlan') { incomplete = true; break; }
                                    conf.switchport.native_vlan = args[4];
                                }
                            } else if (args[1] === 'port-security') {
                                if (!conf.portSecurity) conf.portSecurity = {};
                                if (args.length === 2) conf.portSecurity.enabled = true;
                                else if (args[2] === 'maximum') conf.portSecurity.maximum = parseInt(args[3]);
                                else if (args[2] === 'violation') conf.portSecurity.violation = args[3];
                                else if (args[2] === 'mac-address') conf.portSecurity.stickyMac = true;
                            }
                            commandFound = true; break;
                        case 'cdp': 
                             if (args.length < 2) { incomplete = true; break; }
                             if (args[1] === 'enable') {
                                 if (!deviceState.runningConfig.cdp) deviceState.runningConfig.cdp = { enabled: true, interfaces: {} };
                                 deviceState.runningConfig.cdp.interfaces[name] = true; 
                             }
                             commandFound = true; break;
                        case 'lldp': 
                             if (args.length < 2) { incomplete = true; break; } 
                             if (args[1] === 'transmit' || args[1] === 'receive') {
                                 if (!deviceState.runningConfig.lldp) deviceState.runningConfig.lldp = { enabled: false, interfaces: {} };
                                 if (!deviceState.runningConfig.lldp.interfaces) deviceState.runningConfig.lldp.interfaces = {};
                                 if (!deviceState.runningConfig.lldp.interfaces[name]) deviceState.runningConfig.lldp.interfaces[name] = { transmit: true, receive: true };

                                 if (args[1] === 'transmit') deviceState.runningConfig.lldp.interfaces[name].transmit = true;
                                 else if (args[1] === 'receive') deviceState.runningConfig.lldp.interfaces[name].receive = true;
                                 commandFound = true;
                             }
                             break;
                        case 'ip':
                            if (args.length < 2) { incomplete = true; break; }
                            if (args[1] === 'address' || args[1] === 'add') {
                                if (args.length < 4) { incomplete = true; break; }
                                conf.ip = args[2]; conf.mask = args[3];
                            }
                            else if (args[1] === 'access-group') { if (args.length < 4) { incomplete = true; break; } if (!conf.accessGroup) conf.accessGroup = {}; conf.accessGroup[args[3]] = args[2]; }
                            else if (args[1] === 'helper-address') { if (args.length < 3) { incomplete = true; break; } conf.ipHelper = args[2]; }
                            else if (args[1] === 'ospf') {
                                if (args.length < 3) { incomplete = true; break; }
                                if (args[2] === 'priority') {
                                    if (args.length < 4) { incomplete = true; break; }
                                    if (!conf.ospf) conf.ospf = {};
                                    conf.ospf.priority = parseInt(args[3]);
                                } else {
                                    if (args.length < 5 || args[3].toLowerCase() !== 'area') { incomplete = true; break; }
                                    if (!conf.ospf) conf.ospf = {};
                                    conf.ospf.processId = args[2];
                                    conf.ospf.area = args[4];
                                }
                            }
                            commandFound = true; break;
                        case 'ipv6':
                            if (args.length < 2) { incomplete = true; break; }
                            if (args[1] === 'address' || args[1] === 'add') {
                                if (args.length < 3) { incomplete = true; break; }
                                conf.ipv6 = args[2];
                            }
                            commandFound = true; break;
                        default: break;
                    }
                }
                if (incomplete) appendToTerminal('% Incomplete command.'); else if (!commandFound) appendToTerminal('% Invalid input detected at \'^\'');
            }

            function processVlanModeCommand(mainCommand, args) {
                if (mainCommand === 'name') {
                    if (args.length < 2) appendToTerminal('% Incomplete command.');
                    else deviceState.runningConfig.vlans[deviceState.currentVlan].name = args.slice(1).join(' ');
                }
                else if (mainCommand === 'exit') { deviceState.mode = deviceState.configStack.pop(); updatePrompt(); }
                else if (mainCommand === 'end') { deviceState.mode = 'privileged'; deviceState.configStack = []; updatePrompt(); return; }
                else appendToTerminal('% Invalid input detected at \'^\'');
            }

            function processAclModeCommand(mainCommand, args) {
                const acl = deviceState.runningConfig.acls[deviceState.currentAcl];
                if (mainCommand === 'exit') { deviceState.mode = deviceState.configStack.pop(); updatePrompt(); return; }
                if (mainCommand === 'end') { deviceState.mode = 'privileged'; deviceState.configStack = []; updatePrompt(); return; }
                if (mainCommand === 'permit' || mainCommand === 'deny') {
                    if (acl.type === 'extended' && args.length < 4) { appendToTerminal('% Incomplete command.'); return; } 
                    else if (acl.type === 'standard' && args.length < 2) { appendToTerminal('% Incomplete command.'); return; }
                    
                    const normalizedArgs = args.slice(1).map(arg => arg.toLowerCase() === 'www' ? '80' : arg);
                    
                    const entry = { action: mainCommand, raw: normalizedArgs.join(' '), sequenceNumber: acl.entries.length + 10 };
                    acl.entries.push(entry);
                } else if (mainCommand === 'no') { if (args.length < 2) { appendToTerminal('% Incomplete command.'); return; } } 
                else { appendToTerminal('% Invalid input detected at \'^\''); }
            }

            function processLineModeCommand(mainCommand, args) {
                if (mainCommand === 'transport') {
                    if (args.length < 3) { appendToTerminal('% Incomplete command.'); return; }
                    if (args[1] !== 'input') { appendToTerminal('% Invalid input detected at \'^\''); return; }
                    deviceState.runningConfig.lines['vty 0 4'].transport.input = args.slice(2);
                }
                else if (mainCommand === 'login') {
                    if (args[1] === 'local') deviceState.runningConfig.lines['vty 0 4'].loginMethod = 'local';
                    else appendToTerminal('% Invalid input detected at \'^\'');
                }
                else if (mainCommand === 'exit') { deviceState.mode = deviceState.configStack.pop(); updatePrompt(); }
                else if (mainCommand === 'end') { deviceState.mode = 'privileged'; deviceState.configStack = []; updatePrompt(); }
                else appendToTerminal('% Invalid input detected at \'^\'');
            }

            function processCommand(command) {
                if (!command) return;
                const args = command.trim().split(/\s+/);
                const mainCommand = args[0].toLowerCase();
                
                if (deviceState.mode === 'user') processUserModeCommand(mainCommand, args);
                else if (deviceState.mode === 'privileged') processPrivilegedModeCommand(mainCommand, args);
                else if (deviceState.mode === 'config') processConfigModeCommand(mainCommand, args);
                else if (deviceState.mode === 'router') processRouterModeCommand(mainCommand, args);
                else if (deviceState.mode.startsWith('interface')) processInterfaceModeCommand(mainCommand, args);
                else if (deviceState.mode === 'vlan') processVlanModeCommand(mainCommand, args);
                else if (deviceState.mode === 'acl') processAclModeCommand(mainCommand, args);
                else if (deviceState.mode === 'line') processLineModeCommand(mainCommand, args);
            }

            commandInput.addEventListener('keydown', function (e) {
                if (e.key === 'Tab') { handleTabCompletion(e); return; }
                if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (commandHistory.length > 0 && historyIndex > 0) { historyIndex--; commandInput.value = commandHistory[historyIndex]; } 
                    else if (historyIndex === -1 && commandHistory.length > 0) { historyIndex = commandHistory.length - 1; commandInput.value = commandHistory[historyIndex]; }
                    return;
                }
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (historyIndex < commandHistory.length - 1) { historyIndex++; commandInput.value = commandHistory[historyIndex]; } 
                    else { historyIndex = commandHistory.length; commandInput.value = ''; }
                    return;
                }
                if (e.key === 'Enter') {
                    const rawVal = commandInput.value;
                    const val = rawVal.trim();
                    commandInput.value = '';
                    
                    if (deviceState.awaitingInput) {
                        appendToTerminal(`${promptSpan.textContent}${rawVal}`);
                        
                        if (deviceState.awaitingInput === 'ospf_clear') {
                            if (val.toLowerCase() === 'y' || val.toLowerCase() === 'yes') {
                                if (!deviceState.runningConfig.logs) deviceState.runningConfig.logs = [];
                                deviceState.runningConfig.logs.push({ command: 'clear', target: 'ip ospf process', raw: 'clear ip ospf process', timestamp: Date.now() });
                                appendToTerminal('OSPF processes reset');
                            }
                            deviceState.awaitingInput = null;
                            updatePrompt();
                            return;
                        }
                        
                        if (deviceState.awaitingInput === 'copy_run_start') {
                            appendToTerminal('Building configuration...'); 
                            appendToTerminal('[OK]');
                            deviceState.runningConfig.startupConfig = JSON.parse(JSON.stringify(deviceState.runningConfig));
                            deviceState.awaitingInput = null;
                            updatePrompt();
                            return; 
                        }
                    } else {
                        appendToTerminal(`${promptSpan.textContent} ${val}`);
                    }
                    
                    if (val) { 
                        commandHistory.push(val); 
                        historyIndex = commandHistory.length; 
                        deviceState.commandHistory = [...commandHistory]; 
                    }
                    processCommand(val);
                }
            });

            switchModeBtn.addEventListener('click', () => switchToDeviceMode('switch'));
            routerModeBtn.addEventListener('click', () => switchToDeviceMode('router'));
            
            window.addEventListener('message', function (e) {
                const msg = e.data;
                if (!msg || !msg.type) return;
                switch (msg.type) {
                    case 'GET_STATE': window.parent.postMessage({ type: 'STATE_RESPONSE', payload: JSON.parse(JSON.stringify(deviceState)) }, '*'); break;
                    case 'LOAD_STATE':
                         if (msg.payload) {
                            if (msg.deviceType && msg.deviceType !== deviceType) {
                                deviceType = msg.deviceType;
                            }
                            
                            const baseState = JSON.parse(JSON.stringify(deviceType === 'switch' ? initialSwitchState : initialRouterState));
                            deviceState = Object.assign(baseState, msg.payload);
                            
                            if (!deviceState.screenLog) deviceState.screenLog = [];
                            if (!deviceState.commandHistory) deviceState.commandHistory = [];
                            
                            commandHistory = [...deviceState.commandHistory];
                            historyIndex = commandHistory.length;

                            if (!isInitialized) {
                                initializeEngine();
                            } else {
                                renderTerminal();
                                updatePrompt();
                            }
                         }
                         break;
                    case 'RESET_REQUEST': window.parent.postMessage({ type: 'RESET_REQUEST' }, '*'); break;
                    case 'RESET_CONFIRMED': onResetConfirmed(); break;
                }
            });
            window.parent.postMessage({ type: 'ENGINE_READY' }, '*');
            
            if (paramHostname || paramType) {
                initializeEngine();
            }
        });
    </script>
</body>
</html>
